<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultats du Sondage — K-Ni Htech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07090f;
  --bg2: #0e1320;
  --bg3: #141e30;
  --border: #1a2540;
  --text: #f0f4ff;
  --text2: #7a8db5;
  --text3: #3d5080;
  --gold: #f5c542;
  --teal: #00d4aa;
  --rose: #ff5f7e;
  --blue: #4f9eff;
  --purple: #a78bfa;
  --green: #34d399;
  --orange: #fb923c;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ── NAVBAR ── */
.navbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.navbar-brand {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  background: linear-gradient(90deg, #f5c542, #00d4aa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-right: auto;
  text-decoration: none;
}
.navbar a { color: var(--text2); text-decoration: none; font-size: .875rem; padding: 7px 14px; border-radius: 8px; transition: background .15s; }
.navbar a:hover { background: var(--bg3); color: var(--text); }

/* ── HERO ── */
.stats-hero {
  padding: 40px 28px 28px;
  border-bottom: 1px solid var(--border);
}
.hero-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.hero-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: -.03em;
}
.hero-sub { color: var(--text2); font-size: .9rem; margin-top: 4px; }
.share-btn {
  background: rgba(245,197,66,.12);
  border: 1px solid rgba(245,197,66,.3);
  color: var(--gold);
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: 700;
  font-size: .88rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s;
  text-decoration: none;
  white-space: nowrap;
}
.share-btn:hover { background: rgba(245,197,66,.2); }

/* ── KPI STRIP ── */
.kpi-strip {
  display: flex;
  gap: 14px;
  padding: 20px 28px;
  flex-wrap: wrap;
}
.kpi-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 22px;
  min-width: 140px;
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent-line, var(--gold));
}
.kpi-label { font-size: .72rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.kpi-value { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: 500; margin-top: 4px; }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: 10px;
  padding: 0 28px 20px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-label { font-size: .8rem; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.filter-chip {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: .8rem;
  font-weight: 700;
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
}
.filter-chip:hover { border-color: var(--gold); color: var(--gold); }
.filter-chip.active { border-color: var(--gold); color: var(--gold); background: rgba(245,197,66,.1); }

/* ── GRID ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 20px;
  padding: 0 28px 40px;
}

.stat-block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  transition: border-color .2s;
}
.stat-block:hover { border-color: rgba(79,158,255,.25); }
.stat-block.full-width { grid-column: 1 / -1; }

.block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}
.block-title {
  font-family: 'Syne', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.block-total { font-size: .75rem; color: var(--text3); background: var(--bg3); border-radius: 20px; padding: 3px 10px; }

/* Bar rows */
.bar-rows { display: flex; flex-direction: column; gap: 12px; }
.bar-row {}
.bar-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
  font-size: .82rem;
}
.bar-label { color: var(--text); font-weight: 600; display: flex; align-items: center; gap: 6px; }
.bar-pct { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--text2); }
.bar-track {
  height: 8px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
}
.bar-count { font-size: .72rem; color: var(--text3); margin-top: 3px; }

/* Donut canvas block */
.donut-wrap {
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.donut-canvas { max-width: 160px; max-height: 160px; flex-shrink: 0; }
.donut-legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: .82rem; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-label { color: var(--text2); flex: 1; }
.legend-pct { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--text); font-size: .8rem; }

/* Age pyramid chart */
.age-bars { display: flex; flex-direction: column; gap: 10px; }
.age-row { display: flex; align-items: center; gap: 12px; }
.age-tag { font-size: .78rem; font-weight: 700; min-width: 70px; color: var(--text2); font-family: 'DM Mono', monospace; }
.age-bar-track { flex: 1; height: 32px; background: var(--bg3); border-radius: 8px; overflow: hidden; display: flex; align-items: center; }
.age-bar-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; padding: 0 12px; font-size: .78rem; font-weight: 700; color: #fff; transition: width 1s cubic-bezier(.4,0,.2,1); white-space: nowrap; min-width: 0; }
.age-count { font-size: .75rem; color: var(--text3); min-width: 50px; text-align: right; font-family: 'DM Mono', monospace; }

/* Cross-tab */
.cross-tab { overflow-x: auto; }
.cross-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
.cross-table th { padding: 8px 12px; text-align: left; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
.cross-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.04); }
.cross-table tr:hover td { background: rgba(255,255,255,.03); }
.cell-bar { display: flex; align-items: center; gap: 8px; }
.cell-mini-bar { height: 6px; border-radius: 3px; min-width: 4px; transition: width .8s; }

/* Insight card */
.insight-card {
  background: linear-gradient(135deg, rgba(245,197,66,.08), rgba(0,212,170,.05));
  border: 1px solid rgba(245,197,66,.2);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.insight-icon { font-size: 1.5rem; flex-shrink: 0; }
.insight-title { font-weight: 700; font-size: .88rem; color: var(--gold); margin-bottom: 4px; }
.insight-text { font-size: .82rem; color: var(--text2); line-height: 1.6; }
.insights-list { display: flex; flex-direction: column; gap: 12px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
  grid-column: 1 / -1;
}
.empty-icon { font-size: 3rem; margin-bottom: 16px; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--text2); margin-bottom: 8px; }

/* Loading */
.loading-pulse { animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Responsive */
@media (max-width: 640px) {
  .stats-grid { grid-template-columns: 1fr; padding: 0 14px 40px; }
  .kpi-strip, .filter-bar, .stats-hero { padding-left: 14px; padding-right: 14px; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand">📊 K-Ni Htech</a>
  <a href="/training">Training</a>
  <a href="/survey" style="color:var(--gold);font-weight:700;">📋 Sondage</a>
  <a href="/survey/stats" style="color:var(--text);font-weight:700;background:var(--bg3);">📊 Résultats</a>
</nav>

<!-- HERO -->
<div class="stats-hero">
  <div class="hero-top">
    <div>
      <div class="hero-title">📊 Résultats du sondage</div>
      <div class="hero-sub">Perceptions sur le trading, la liberté financière et les paris sportifs</div>
    </div>
    <a href="/survey" class="share-btn">🔗 Partager le sondage</a>
  </div>
</div>

<!-- KPIs -->
<div class="kpi-strip" id="kpi-strip">
  <div class="kpi-card" style="--accent-line: var(--gold)">
    <div class="kpi-label">Réponses total</div>
    <div class="kpi-value loading-pulse" id="kpi-total">—</div>
  </div>
  <div class="kpi-card" style="--accent-line: var(--teal)">
    <div class="kpi-label">Aujourd'hui</div>
    <div class="kpi-value loading-pulse" id="kpi-today">—</div>
  </div>
  <div class="kpi-card" style="--accent-line: var(--blue)">
    <div class="kpi-label">Tranche dominante</div>
    <div class="kpi-value loading-pulse" id="kpi-age" style="font-size:1.4rem;">—</div>
  </div>
  <div class="kpi-card" style="--accent-line: var(--purple)">
    <div class="kpi-label">Score liberté fin.</div>
    <div class="kpi-value loading-pulse" id="kpi-score">—</div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Filtrer par âge :</span>
  <button class="filter-chip active" onclick="setFilter('all', this)">Tous</button>
  <button class="filter-chip" onclick="setFilter('15-17', this)">15-17</button>
  <button class="filter-chip" onclick="setFilter('18-24', this)">18-24</button>
  <button class="filter-chip" onclick="setFilter('25-34', this)">25-34</button>
  <button class="filter-chip" onclick="setFilter('35-44', this)">35-44</button>
  <button class="filter-chip" onclick="setFilter('45-54', this)">45-54</button>
  <button class="filter-chip" onclick="setFilter('55+', this)">55+</button>
</div>

<!-- STATS GRID -->
<div class="stats-grid" id="stats-grid">
  <div class="empty-state">
    <div class="empty-icon loading-pulse">📊</div>
    <div class="empty-title">Chargement des données…</div>
  </div>
</div>

<script>
let allData = null;
let currentFilter = 'all';

// Palette
const COLORS = ['#f5c542','#00d4aa','#4f9eff','#a78bfa','#fb923c','#ff5f7e','#34d399','#818cf8'];
const LABELS = {
  // age
  '15-17':'15-17 ans','18-24':'18-24 ans','25-34':'25-34 ans','35-44':'35-44 ans','45-54':'45-54 ans','55+':'55 ans +',
  // financial status
  'tres_difficile':'😰 Très difficile','difficile':'😟 Difficile','moyen':'😐 Correct','bien':'😊 Bien','tres_bien':'🤑 Très bien',
  // trading knowledge
  'jamais_entendu':'🤔 Jamais entendu','vaguement':'👂 Entendu parler','connais':'📖 Je connais','pratique':'💻 Je pratique',
  // trading opinion
  'arnaque':'🚨 Arnaque','risque':'⚠️ Risqué mais possible','neutre':'🤷 Neutre','opportunite':'🌟 Opportunité','riche_rapide':'🎰 Riche rapidement',
  // trading interest
  'inscris_direct':'🔥 Je m\'inscris direct','reflechis':'🤔 J\'y réfléchis','regarde_dabord':'👀 Je regarde d\'abord','non_interesse':'😴 Pas intéressé(e)',
  // liberté financière
  'oui_travail':'💪 Oui, avec du travail','oui_chance':'🍀 Oui, avec de la chance','pour_certains':'👆 Pour certains seulement','non_mythe':'❌ Non, c\'est un mythe',
  // obstacle
  'revenus':'💵 Manque de revenus','connaissances':'📚 Manque de connaissances','discipline':'🧠 La discipline','peur':'😨 La peur de perdre','temps':'⏰ Manque de temps',
  // paris
  'jamais':'🙅 Jamais','une_fois':'1️⃣ Une ou deux fois','parfois':'🎲 Parfois','regulier':'⚽ Régulièrement','arrete':'🚫 J\'ai arrêté',
  // paris opinion
  'oui_expert':'🏆 Oui pour les experts','oui_chanceux':'🍀 Oui les chanceux','non_addiction':'⚠️ Non, c\'est addictif','non_arnaque':'🚫 Non, les bookmakers gagnent toujours',
  // comparaison
  'pareil':'🟰 Pareil','similaire':'≈ Similaire','tres_different':'📊 Très différent','sais_pas':'🤷 Je ne sais pas',
  // recommandation
  'oui_absolument':'🔥 Absolument','oui_peut_etre':'👍 Pourquoi pas','non_trop_risque':'⚠️ Non, trop risqué','non_pas_utile':'🤷 Ça dépend',
};

async function loadData() {
  try {
    const res = await fetch('/survey/api/stats');
    const data = await res.json();
    if (data.success) {
      allData = data;
      renderAll();
    }
  } catch(e) {
    document.getElementById('stats-grid').innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">Impossible de charger les données</div>
      <p style="color:var(--text3);font-size:.85rem;margin-top:8px;">${e.message}</p>
    </div>`;
  }
}

function setFilter(age, btn) {
  currentFilter = age;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function getFiltered(responses) {
  if (currentFilter === 'all') return responses;
  return responses.filter(r => r.age === currentFilter);
}

function count(responses, field) {
  const c = {};
  responses.forEach(r => {
    const v = r[field];
    if (v !== undefined && v !== null && v !== '') {
      c[v] = (c[v] || 0) + 1;
    }
  });
  return c;
}

function renderAll() {
  if (!allData) return;
  const responses = getFiltered(allData.responses);
  const total = responses.length;

  // KPIs
  document.getElementById('kpi-total').textContent = allData.total;
  document.getElementById('kpi-today').textContent = allData.today;

  const ageCounts = count(allData.responses, 'age');
  const topAge = Object.entries(ageCounts).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('kpi-age').textContent = topAge ? topAge[0] + ' ans' : '—';
  document.getElementById('kpi-age').classList.remove('loading-pulse');

  const scoreCounts = count(responses, 'liberte_score');
  const scores = Object.entries(scoreCounts);
  let weightedSum = 0, scoreTotal = 0;
  scores.forEach(([v, n]) => { weightedSum += Number(v) * n; scoreTotal += n; });
  const avgScore = scoreTotal > 0 ? (weightedSum / scoreTotal).toFixed(1) : '—';
  document.getElementById('kpi-score').textContent = avgScore + '/10';
  document.querySelectorAll('.loading-pulse').forEach(el => el.classList.remove('loading-pulse'));

  if (total === 0) {
    document.getElementById('stats-grid').innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">Aucune réponse ${currentFilter !== 'all' ? 'pour cette tranche d\'âge' : 'pour l\'instant'}</div>
      <p style="color:var(--text3);font-size:.85rem;margin-top:8px;">Partage le sondage pour collecter des données !</p>
    </div>`;
    return;
  }

  let html = '';

  // 1. AGE Distribution
  const ageData = count(responses, 'age');
  html += renderAgeBlock(ageData, total);

  // 2. Trading knowledge
  html += renderBarBlock('📈 Connaissance du trading', count(responses, 'trading_knowledge'), total, '#4f9eff');

  // 3. Trading opinion
  html += renderBarBlock('🧠 Perception du trading', count(responses, 'trading_opinion'), total, '#f5c542');

  // 4. Trading interest
  html += renderBarBlock('🚀 Intérêt pour une formation', count(responses, 'trading_interest'), total, '#34d399');

  // 5. Financial status
  html += renderDonutBlock('💰 Situation financière', count(responses, 'financial_status'), total);

  // 6. Liberté financière belief
  html += renderBarBlock('💸 Liberté financière accessible ?', count(responses, 'liberte_financiere'), total, '#a78bfa');

  // 7. Obstacles
  html += renderBarBlock('🚧 Principal obstacle', count(responses, 'liberte_obstacle'), total, '#fb923c');

  // 8. Liberte score distribution
  html += renderScoreBlock(count(responses, 'liberte_score'), total);

  // 9. Paris sportifs — pratique
  html += renderBarBlock('⚽ Pratique des paris sportifs', count(responses, 'paris_connaissance'), total, '#ff5f7e');

  // 10. Paris opinion
  html += renderBarBlock('🎯 Les paris peuvent-ils être un revenu ?', count(responses, 'paris_opinion'), total, '#fb923c');

  // 11. Comparaison trading / paris
  html += renderDonutBlock('🤔 Trading vs Paris sportifs — même chose ?', count(responses, 'paris_trading_compare'), total);

  // 12. Recommandation
  html += renderBarBlock('👥 Recommandation formation trading', count(responses, 'recommandation'), total, '#00d4aa');

  // 13. Cross-tab: Age vs Trading opinion
  if (currentFilter === 'all') {
    html += renderCrossTab(allData.responses, 'age', 'trading_opinion', '🔬 Perception du trading selon l\'âge');
    html += renderCrossTab(allData.responses, 'age', 'liberte_financiere', '🔬 Croyance en la liberté financière selon l\'âge');
  }

  // 14. Insights
  html += renderInsights(responses, total);

  document.getElementById('stats-grid').innerHTML = html;

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.bar-fill, .age-bar-fill, .cell-mini-bar').forEach(el => {
      const w = el.dataset.width;
      if (w) el.style.width = w + '%';
    });
    renderCharts();
  }, 50);
}

function pct(n, total) { return total > 0 ? Math.round((n / total) * 100) : 0; }
function label(v) { return LABELS[v] || v; }

function renderBarBlock(title, data, total, color) {
  const sorted = Object.entries(data).sort((a,b) => b[1]-a[1]);
  let html = `<div class="stat-block">
    <div class="block-header">
      <div class="block-title">${title}</div>
      <span class="block-total">${total} rép.</span>
    </div>
    <div class="bar-rows">`;
  sorted.forEach(([v, n], i) => {
    const p = pct(n, total);
    const c = COLORS[i % COLORS.length];
    html += `<div class="bar-row">
      <div class="bar-top">
        <span class="bar-label">${label(v)}</span>
        <span class="bar-pct" style="color:${c}">${p}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="background:${c};width:0%" data-width="${p}"></div>
      </div>
      <div class="bar-count">${n} réponse${n>1?'s':''}</div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderDonutBlock(title, data, total) {
  const sorted = Object.entries(data).sort((a,b) => b[1]-a[1]);
  const id = 'donut-' + Math.random().toString(36).slice(2,7);
  let legend = '';
  sorted.forEach(([v, n], i) => {
    const p = pct(n, total);
    legend += `<div class="legend-item">
      <div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>
      <span class="legend-label">${label(v)}</span>
      <span class="legend-pct">${p}%</span>
    </div>`;
  });
  return `<div class="stat-block">
    <div class="block-header"><div class="block-title">${title}</div><span class="block-total">${total} rép.</span></div>
    <div class="donut-wrap">
      <canvas class="donut-canvas" id="${id}" data-values='${JSON.stringify(sorted.map(x=>x[1]))}' data-labels='${JSON.stringify(sorted.map(x=>label(x[0])))}'></canvas>
      <div class="donut-legend">${legend}</div>
    </div>
  </div>`;
}

function renderAgeBlock(data, total) {
  const ageOrder = ['15-17','18-24','25-34','35-44','45-54','55+'];
  const colors = ['#00d4aa','#4f9eff','#f5c542','#a78bfa','#fb923c','#ff5f7e'];
  let html = `<div class="stat-block">
    <div class="block-header"><div class="block-title">👥 Répartition par tranche d'âge</div><span class="block-total">${total} rép.</span></div>
    <div class="age-bars">`;
  ageOrder.forEach((age, i) => {
    const n = data[age] || 0;
    const p = pct(n, total);
    html += `<div class="age-row">
      <span class="age-tag">${age} ans</span>
      <div class="age-bar-track">
        <div class="age-bar-fill" style="background:${colors[i]};width:0%;color:#000" data-width="${Math.max(p,4)}">
          ${p > 8 ? p + '%' : ''}
        </div>
      </div>
      <span class="age-count">${n} / ${p}%</span>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderScoreBlock(data, total) {
  const colors = ['#ff5f7e','#fb923c','#fbbf24','#f5c542','#a3e635','#34d399','#00d4aa','#4f9eff','#a78bfa','#818cf8'];
  let html = `<div class="stat-block">
    <div class="block-header"><div class="block-title">⭐ Score Liberté Financière (sur 10)</div><span class="block-total">${total} rép.</span></div>
    <div class="bar-rows">`;
  for (let i = 1; i <= 10; i++) {
    const n = data[i] || data[String(i)] || 0;
    const p = pct(n, total);
    html += `<div class="bar-row">
      <div class="bar-top">
        <span class="bar-label">${i}/10</span>
        <span class="bar-pct" style="color:${colors[i-1]}">${p}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="background:${colors[i-1]};width:0%" data-width="${p}"></div>
      </div>
    </div>`;
  }
  html += `</div></div>`;
  return html;
}

function renderCrossTab(responses, rowField, colField, title) {
  const rows = [...new Set(responses.map(r => r[rowField]).filter(Boolean))].sort();
  const cols = [...new Set(responses.map(r => r[colField]).filter(Boolean))];

  let html = `<div class="stat-block full-width">
    <div class="block-header"><div class="block-title">${title}</div></div>
    <div class="cross-tab">
    <table class="cross-table">
    <thead><tr><th>Tranche d'âge</th>`;
  cols.forEach((c, i) => { html += `<th style="color:${COLORS[i%COLORS.length]}">${label(c)}</th>`; });
  html += `</tr></thead><tbody>`;

  rows.forEach(row => {
    const rowResp = responses.filter(r => r[rowField] === row);
    const rowTotal = rowResp.length;
    html += `<tr><td><strong>${LABELS[row] || row}</strong> <span style="color:var(--text3);font-size:.75rem;">(${rowTotal})</span></td>`;
    cols.forEach((c, i) => {
      const n = rowResp.filter(r => r[colField] === c).length;
      const p = pct(n, rowTotal);
      html += `<td><div class="cell-bar">
        <div class="cell-mini-bar" style="background:${COLORS[i%COLORS.length]};width:0%" data-width="${Math.max(p,2)}"></div>
        <span style="font-family:'DM Mono',monospace;font-size:.78rem;">${p}%</span>
      </div></td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div></div>`;
  return html;
}

function renderInsights(responses, total) {
  if (total < 3) return '';
  const insights = [];

  // Trading interest insight
  const tInterest = count(responses, 'trading_interest');
  const interested = (tInterest['inscris_direct'] || 0) + (tInterest['reflechis'] || 0);
  const pInterest = pct(interested, total);
  if (pInterest > 0) insights.push({
    icon: '🔥',
    title: `${pInterest}% ouverts à une formation trading`,
    text: `Sur ${total} répondants, ${interested} personnes seraient prêtes ou pourraient envisager de suivre une formation en trading. Un signal fort !`
  });

  // Liberté financière belief
  const lfData = count(responses, 'liberte_financiere');
  const believers = (lfData['oui_travail'] || 0) + (lfData['oui_chance'] || 0);
  const pbel = pct(believers, total);
  if (pbel > 0) insights.push({
    icon: '💡',
    title: `${pbel}% croient à la liberté financière`,
    text: `La majorité des répondants pensent que l'indépendance financière est accessible. C'est une base solide pour motiver la formation.`
  });

  // Perception trading vs paris
  const comp = count(responses, 'paris_trading_compare');
  const confus = comp['pareil'] || 0;
  const pconf = pct(confus, total);
  if (pconf > 20) insights.push({
    icon: '⚠️',
    title: `${pconf}% confondent trading et paris sportifs`,
    text: `Une part non négligeable pense que les deux sont identiques. C'est une opportunité d'éducation pour distinguer l'investissement du jeu.`
  });

  if (insights.length === 0) return '';

  let html = `<div class="stat-block full-width">
    <div class="block-header"><div class="block-title">💎 Insights clés</div></div>
    <div class="insights-list">`;
  insights.forEach(ins => {
    html += `<div class="insight-card">
      <span class="insight-icon">${ins.icon}</span>
      <div>
        <div class="insight-title">${ins.title}</div>
        <div class="insight-text">${ins.text}</div>
      </div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderCharts() {
  document.querySelectorAll('canvas.donut-canvas').forEach(canvas => {
    const values = JSON.parse(canvas.dataset.values || '[]');
    const labels = JSON.parse(canvas.dataset.labels || '[]');
    if (!values.length) return;
    new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: COLORS.slice(0, values.length),
          borderWidth: 0,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        cutout: '72%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.label}: ${ctx.parsed} (${Math.round(ctx.parsed / ctx.dataset.data.reduce((a,b)=>a+b,0)*100)}%)`
            }
          }
        }
      }
    });
  });
}

// Load on start
loadData();
// Refresh every 30 seconds
setInterval(loadData, 30000);
